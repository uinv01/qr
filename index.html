<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إصدار الهوية الذكية - جامعة المعارف</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- المتغيرات والتصميم الأساسي مأخوذ من النظام الأم --- */
        :root { 
            --primary: #0a3d62; 
            --secondary: #3c6382; 
            --accent: #00cec9; 
            --success: #20bf6b; 
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            margin: 0; padding: 0;
            background: var(--bg-color); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .top-bar {
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px 20px; 
            font-size: 24px; 
            font-weight: 900;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            position: relative; 
            z-index: 1000;
            letter-spacing: 1px;
        }

        .main-wrapper { flex: 1; padding: 25px 15px; display: flex; justify-content: center; align-items: flex-start; }
        
        .container { 
            background: var(--card-bg); width: 100%; max-width: 500px; 
            padding: 35px 25px; border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.03); 
            text-align: center; box-sizing: border-box;
        }
        
        .page-title { color: var(--primary); font-size: 22px; font-weight: 900; margin-bottom: 25px; margin-top: 0; }

        /* --- صندوق التعليمات للطلاب --- */
        .instructions {
            background: #f1f8ff;
            border: 1px solid #d1e5f7;
            border-radius: 12px;
            padding: 15px;
            text-align: right;
            margin-bottom: 25px;
            font-size: 14px;
            color: var(--secondary);
            line-height: 1.7;
        }
        .instructions font { font-weight: bold; color: var(--primary); font-size: 15px;}
        
        /* --- الأزرار والحقول --- */
        .input-field { 
            width: 100%; padding: 16px; border: 2px solid #ecf0f1; border-radius: 12px; 
            font-size: 16px; margin-bottom: 20px; box-sizing: border-box; text-align: center; 
            font-family: 'Cairo', sans-serif; background: #fdfdfd; transition: all 0.3s;
            font-weight: 700; color: var(--primary);
        }
        .input-field:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(10, 61, 98, 0.1); }
        .input-field::placeholder { color: #bdc3c7; font-weight: 400; }

        .btn { 
            color: #fff; border: none; padding: 16px; width: 100%; font-size: 16px; 
            border-radius: 12px; cursor: pointer; font-weight: 700; transition: all 0.3s ease; 
            margin-bottom: 15px; display: flex; align-items: center; justify-content: center; 
            box-sizing: border-box; font-family: 'Cairo', sans-serif; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .btn:active { transform: translateY(1px); }
        
        .btn-primary { background: linear-gradient(135deg, var(--primary), #105b92); }
        .btn-success { background: linear-gradient(135deg, var(--success), #179350); }
        .btn-dept { background: #f8f9fa; color: var(--primary); border: 2px solid #e9ecef; box-shadow: none; }
        .btn-dept:hover { border-color: var(--primary); background: #fff; }

        /* --- تنسيقات قسم QR --- */
        .qr-frame {
            background: #fff;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            border: 3px solid var(--accent);
            display: inline-block;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        #qrImage { display: block; max-width: 100%; width: 250px; height: 250px; border-radius: 10px; }
        .student-name-display { font-size: 20px; font-weight: 900; color: var(--primary); margin-top: 15px; text-align: center; }
        
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        /* --- الفوتر وحقوق المطور --- */
        .footer { text-align: center; padding: 25px 20px; font-size: 15px; font-weight: 700; background: #ecf0f1; margin-top: auto; border-top: 1px solid #dfe6e9; }
        .footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

<div class="top-bar">جامعة المعارف</div>

<div class="main-wrapper">
    <div class="container">
        <h2 class="page-title">إصدار الهوية الذكية</h2>

        <div class="instructions" id="instructionsBox">
            <font>طالبنا العزيز:</font><br>
            ١. اكتب اسمك الثلاثي مطابقاً للقوائم الرسمية.<br>
            ٢. اضغط توليد ثم  <b>لحفظ الصورة</b> في هاتفك.<br>
            ٣. أبرز الصورة عند أخذ الحضور لتسجيلك فوراً.
        </div>

        <div id="inputBox">
            <input type="text" id="studentNameForQR" class="input-field" placeholder="اكتب اسمك الثلاثي هنا..." autocomplete="off">
            <button class="btn btn-primary" onclick="generateQR()" id="btnGenerate">توليد الباركود الخاص بي</button>
        </div>

        <div id="qrResultBox" style="display:none; flex-direction:column; align-items:center;">
            <div class="qr-frame">
                <img id="qrImage" src="" alt="Student QR Code">
                <div class="student-name-display" id="displayName"></div>
            </div>
            
            <button class="btn btn-success" onclick="downloadQR()" id="btnDownload"> حفظ الباركود في الهاتف</button>
            <button class="btn btn-dept" onclick="resetQR()"> إنشاء باركود آخر</button>
        </div>

    </div>
</div>

<div class="footer"><a href="https://har37ith.vercel.app/" target="_blank">تم التطوير بواسطة حارث</a></div>

<script>
    function generateQR() {
        const input = document.getElementById("studentNameForQR");
        const name = input.value.trim();
        
        // التحقق من أن الاسم منطقي (ثنائي على الأقل)
        if (name.length < 5 || name.split(" ").length < 2) {
            alert("يرجى كتابة الاسم الثنائي أو الثلاثي بشكل صحيح ومكتمل.");
            input.focus();
            return;
        }

        // توليد الباركود بدقة ممتازة للقراءة من شاشة الهاتف
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=500x500&margin=15&data=${encodeURIComponent(name)}`;
        
        document.getElementById("qrImage").src = qrUrl;
        document.getElementById("displayName").innerText = name;
        
        // إخفاء حقل الإدخال والتعليمات وعرض النتيجة
        document.getElementById("inputBox").style.display = "none";
        document.getElementById("instructionsBox").style.display = "none";
        document.getElementById("qrResultBox").style.display = "flex";
    }
    
    async function downloadQR() {
        const name = document.getElementById("displayName").innerText;
        const qrUrl = document.getElementById("qrImage").src;
        
        const btn = document.getElementById("btnDownload");
        const originalText = btn.innerText;
        btn.innerText = "جاري التحميل... ⏳";
        
        try {
            const response = await fetch(qrUrl);
            const blob = await response.blob();
            const link = document.createElement("a");
            link.href = window.URL.createObjectURL(blob);
            link.download = `هوية_الحضور_${name.replace(/\s+/g, '_')}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            btn.innerText = "✅ تم الحفظ بنجاح";
            setTimeout(() => { btn.innerText = originalText; }, 2000);
        } catch (err) {
            alert("عذراً، حدث خطأ أثناء الحفظ. يمكنك التقاط صورة للشاشة (Screenshot) بدلاً من ذلك.");
            btn.innerText = originalText;
        }
    }
    
    function resetQR() { 
        document.getElementById("studentNameForQR").value = ""; 
        document.getElementById("qrResultBox").style.display = "none"; 
        // إعادة إظهار التعليمات وحقل الإدخال
        document.getElementById("instructionsBox").style.display = "block";
        document.getElementById("inputBox").style.display = "block"; 
        document.getElementById("studentNameForQR").focus();
    }
</script>
</body>
</html>
